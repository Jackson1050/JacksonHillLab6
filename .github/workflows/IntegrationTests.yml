# Nightly integration tests. Heavier than unit tests — expected to spin up
# DB containers, hit local services, etc. Also runnable on demand from the
# Actions tab via workflow_dispatch.
#
# Expects the standard Failsafe naming convention: *IT.java.
# If your integration tests need Postgres / Redis / etc., uncomment the
# `services:` block below and point your test config at localhost.
 
name: Integration Tests
 
on:
  schedule:
    # 02:00 UTC every day.
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag, or SHA to test (default: main)'
        required: false
        default: main
 
concurrency:
  group: integration-tests-${{ github.ref }}
  cancel-in-progress: false  # don't cancel a running nightly when a manual run lands
 
permissions:
  contents: read
  checks: write
 
jobs:
  integration:
    name: Integration tests (Java 21)
    runs-on: ubuntu-latest
    timeout-minutes: 45
 
    # Uncomment to provide backing services to the tests.
    # services:
    #   postgres:
    #     image: postgres:16
    #     env:
    #       POSTGRES_USER: test
    #       POSTGRES_PASSWORD: test
    #       POSTGRES_DB: test
    #     ports: ['5432:5432']
    #     options: >-
    #       --health-cmd pg_isready
    #       --health-interval 10s
    #       --health-timeout 5s
    #       --health-retries 5
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
 
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
 
      - name: Run integration tests
        # `verify` runs Surefire then Failsafe. -DskipUTs isn't standard;
        # if you want to skip unit tests here, use -Dtest=DoesNotExist or
        # a profile that disables surefire.
        run: mvn -B -ntp verify
 
      - name: Upload Failsafe reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failsafe-reports
          path: target/failsafe-reports/
          retention-days: 30
 
      - name: Publish integration test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Integration test results
          path: target/failsafe-reports/TEST-*.xml
          reporter: java-junit
          fail-on-error: false
