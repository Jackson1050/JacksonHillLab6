#Unit Tests run on push / pull from main

name: Unit Tests
 
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}
 
concurrency:
  # Cancel in-progress runs for the same PR/branch when new commits land.
  group: unit-tests-${{ github.ref }}
  cancel-in-progress: true
 
permissions:
  contents: read
  pull-requests: write   
  # needed for the coverage PR comment step
  checks: write
 
jobs:
  test:
    name: Unit tests (Java 21)
    runs-on: ubuntu-latest
    timeout-minutes: 15
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
 
      - name: Run unit tests
        # -B batch mode, -ntp no transfer progress, -DskipITs skips Failsafe (integration) tests.
        run: mvn -B -ntp -DskipITs test
 
      - name: Generate JaCoCo coverage report
        run: mvn -B -ntp jacoco:report
 
      - name: Upload coverage report (HTML + XML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: |
            target/site/jacoco/
            target/jacoco.exec
          retention-days: 14
 
      - name: Upload Surefire test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 14
 
      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Unit test results
          path: target/surefire-reports/TEST-*.xml
          reporter: java-junit
          fail-on-error: false
 
      - name: Post coverage summary on PR
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.7.1
        with:
          paths: target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Coverage Report
          min-coverage-overall: 80    
          min-coverage-changed-files: 80
          update-comment: true
